name: Visual Regression Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Get required Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages[''].devDependencies['playwright'])")" >> $GITHUB_ENV

      - name: Cache playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps --only-shell chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Building the application
        run: npm run build

      - name: Start the Alpha-app for testing in the background
        run: npm run start &
        working-directory: packages/alpha-app

      - name: Wait for Alpha-app to be ready
        run: npx wait-on http://localhost:3000

      - name: Run visual regression tests
        run: npm run test:visual
        working-directory: packages/frontend-ui

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: packages/frontend-ui/test-results
